name: build-and-deploy

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [cv-updated]
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm ci

      - name: Fetch CV data and PDF
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data/content data/variants public/pdfs
          gh release download latest --repo djjay0131/cv --pattern "cv-data.zip" --dir /tmp/cv-fetch --clobber
          gh release download latest --repo djjay0131/cv --pattern "academic.pdf" --dir public/pdfs --clobber
          unzip -o /tmp/cv-fetch/cv-data.zip -d /tmp/cv-fetch/extracted
          cp -r /tmp/cv-fetch/extracted/data/* data/ 2>/dev/null || true
          cp /tmp/cv-fetch/extracted/own-bib.bib data/ 2>/dev/null || true
          cp /tmp/cv-fetch/extracted/photo_jason_1.jpeg public/ 2>/dev/null || true
          rm -rf /tmp/cv-fetch

      - name: Run tests
        run: npm test

      - name: Build Astro
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  smoke-test:
    needs: deploy
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request'
    steps:
      - name: Wait for Pages propagation
        run: sleep 30

      - name: Smoke test live routes
        run: |
          SITE="https://djjay0131.github.io/website"
          FAILED=0
          for ROUTE in "/" "/cv/academic" "/papers/" "/pdfs/academic.pdf" "/projects/"; do
            STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "${SITE}${ROUTE}")
            if [ "$STATUS" = "200" ]; then
              echo "OK: ${ROUTE} → ${STATUS}"
            else
              echo "FAIL: ${ROUTE} → ${STATUS}"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "::error::One or more smoke tests failed."
            exit 1
          fi

      - name: Verify non-empty body on key routes
        run: |
          SITE="https://djjay0131.github.io/website"
          for ROUTE in "/cv/academic" "/papers/"; do
            BODY_SIZE=$(curl -sL "${SITE}${ROUTE}" | wc -c)
            if [ "$BODY_SIZE" -lt 500 ]; then
              echo "::error::${ROUTE} returned suspiciously small body (${BODY_SIZE} bytes)"
              exit 1
            fi
            echo "OK: ${ROUTE} body is ${BODY_SIZE} bytes"
          done

      - name: Notify on failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.NOTIFICATION_WEBHOOK }}
        run: |
          if [ -n "${WEBHOOK_URL}" ]; then
            curl -sSf -X POST "${WEBHOOK_URL}" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"Website smoke test failed: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"
          else
            echo "No NOTIFICATION_WEBHOOK configured; skipping notification."
          fi

  notify-failure:
    needs: [build, deploy]
    runs-on: ubuntu-24.04
    if: failure()
    steps:
      - name: Send failure notification
        env:
          WEBHOOK_URL: ${{ secrets.NOTIFICATION_WEBHOOK }}
        run: |
          if [ -n "${WEBHOOK_URL}" ]; then
            curl -sSf -X POST "${WEBHOOK_URL}" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"Website build/deploy failed: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"
          else
            echo "No NOTIFICATION_WEBHOOK configured; skipping notification."
          fi
